name: Release Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*.*.*"   # 仅在打 tag 时触发 (desktop-v0.1.7)

# 避免重复构建（特别是多个 tag 同时推送时）
concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false  # 发布流程不取消，确保完整性

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      # Ubuntu 系统依赖
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            pkg-config \
            xdg-utils

      # 安装 Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 安装 Rust
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      # 安装根目录依赖（monorepo）
      - name: Install root dependencies
        run: bun install

      # 安装桌面应用依赖
      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: bun install

      # 构建桌面应用前端
      - name: Build frontend
        working-directory: apps/desktop
        run: bun run build
      
      # 验证前端构建 (跨平台)
      - name: Verify frontend build (Unix)
        if: runner.os != 'Windows'
        working-directory: apps/desktop
        run: |
          if [ ! -d "dist" ]; then
            echo "Frontend build failed: dist directory not found"
            exit 1
          fi
          echo "Frontend build successful"
          ls -la dist/
      
      - name: Verify frontend build (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/desktop
        shell: pwsh
        run: |
          if (-not (Test-Path "dist")) {
            Write-Error "Frontend build failed: dist directory not found"
            exit 1
          }
          Write-Output "Frontend build successful"
          Get-ChildItem dist/

      # 预下载 WiX 工具包 (Windows only) - 避免 503 错误
      - name: Cache WiX Toolset
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        id: wix-cache
        with:
          path: ~/.tauri/WixTools
          key: wix-tools-3.14.1
          restore-keys: |
            wix-tools-

      - name: Download WiX Toolset
        if: runner.os == 'Windows' && steps.wix-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $wixDir = "$env:USERPROFILE\.tauri\WixTools"
          New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
          
          $maxRetries = 3
          $retryCount = 0
          $success = $false
          
          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              Write-Output "Downloading WiX Toolset (attempt $($retryCount + 1)/$maxRetries)..."
              Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" -OutFile "$wixDir\wix314-binaries.zip" -UseBasicParsing
              
              Write-Output "Extracting WiX Toolset..."
              Expand-Archive -Path "$wixDir\wix314-binaries.zip" -DestinationPath $wixDir -Force
              Remove-Item "$wixDir\wix314-binaries.zip"
              
              $success = $true
              Write-Output "WiX Toolset downloaded and extracted successfully"
            } catch {
              $retryCount++
              if ($retryCount -lt $maxRetries) {
                Write-Warning "Download failed, retrying in 10 seconds..."
                Start-Sleep -Seconds 10
              } else {
                Write-Error "Failed to download WiX Toolset after $maxRetries attempts"
                throw
              }
            }
          }

      # 构建 Tauri App（不上传到 release）
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      # 上传到 GitHub Release (Linux)
      - name: Upload to Release (Linux)
        if: success() && runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 上传到 GitHub Release (macOS)
      - name: Upload to Release (macOS)
        if: success() && runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            apps/desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/*/release/bundle/macos/*.app.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 上传到 GitHub Release (Windows)
      - name: Upload to Release (Windows)
        if: success() && runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 上传构建产物到 Artifacts (Linux)
      - name: Upload build artifacts (Linux)
        if: success() && runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: tauri-bundles-${{ matrix.platform }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
      
      # 上传构建产物 (macOS)
      - name: Upload build artifacts (macOS)
        if: success() && runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: tauri-bundles-${{ matrix.platform }}-${{ matrix.args }}
          path: |
            apps/desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/*/release/bundle/macos/*.app
      
      # 上传构建产物 (Windows)
      - name: Upload build artifacts (Windows)
        if: success() && runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: tauri-bundles-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  # 构建 MSIX 包（仅 Windows）
  build-msix:
    runs-on: windows-latest
    permissions:
      contents: write
    # 只在打 tag 时运行
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    
    steps:
      - uses: actions/checkout@v6

      # 安装 Rust
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      # 安装 Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 安装依赖
      - name: Install dependencies
        run: |
          bun install
          cd apps/desktop
          bun install

      # 预下载 WiX 工具包 - 避免 503 错误
      - name: Cache WiX Toolset
        uses: actions/cache@v5
        id: wix-cache
        with:
          path: ~/.tauri/WixTools
          key: wix-tools-3.14.1
          restore-keys: |
            wix-tools-

      - name: Download WiX Toolset
        if: steps.wix-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $wixDir = "$env:USERPROFILE\.tauri\WixTools"
          New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
          
          $maxRetries = 3
          $retryCount = 0
          $success = $false
          
          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              Write-Output "Downloading WiX Toolset (attempt $($retryCount + 1)/$maxRetries)..."
              Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" -OutFile "$wixDir\wix314-binaries.zip" -UseBasicParsing
              
              Write-Output "Extracting WiX Toolset..."
              Expand-Archive -Path "$wixDir\wix314-binaries.zip" -DestinationPath $wixDir -Force
              Remove-Item "$wixDir\wix314-binaries.zip"
              
              $success = $true
              Write-Output "WiX Toolset downloaded and extracted successfully"
            } catch {
              $retryCount++
              if ($retryCount -lt $maxRetries) {
                Write-Warning "Download failed, retrying in 10 seconds..."
                Start-Sleep -Seconds 10
              } else {
                Write-Error "Failed to download WiX Toolset after $maxRetries attempts"
                throw
              }
            }
          }

      # 构建 Tauri 应用
      - name: Build Tauri app
        working-directory: apps/desktop
        run: bun run tauri build

      # 创建 MSIX 包
      - name: Create MSIX package
        shell: pwsh
        env:
          MSIX_IDENTITY_NAME: ${{ secrets.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ secrets.MSIX_PUBLISHER }}
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ secrets.MSIX_PUBLISHER_DISPLAY_NAME }}
        run: |
          Write-Output "创建 MSIX 包..."
          
          # 读取版本号
          $config = Get-Content 'apps/desktop/src-tauri/tauri.conf.json' | ConvertFrom-Json
          $version = $config.version
          
          # 获取 Identity 信息（从环境变量或使用默认值）
          $identityName = $env:MSIX_IDENTITY_NAME
          $publisher = $env:MSIX_PUBLISHER
          $publisherDisplayName = $env:MSIX_PUBLISHER_DISPLAY_NAME
          
          # 使用默认值（如果未设置 secrets）- 使用 Microsoft Store Partner Center 的值
          if ([string]::IsNullOrEmpty($identityName)) {
            $identityName = "Jeason.5842835EA9EE6"
            Write-Warning "⚠ 使用默认 Identity Name: $identityName"
          }
          if ([string]::IsNullOrEmpty($publisher)) {
            $publisher = "CN=056C6E40-362E-4DC2-A03D-B19B795AA254"
            Write-Warning "⚠ 使用默认 Publisher: $publisher"
          }
          if ([string]::IsNullOrEmpty($publisherDisplayName)) {
            $publisherDisplayName = "Jeason"
          }
          
          Write-Output ""
          Write-Output "📝 Package Identity:"
          Write-Output "   Name: $identityName"
          Write-Output "   Publisher: $publisher"
          Write-Output "   Publisher Display Name: $publisherDisplayName"
          Write-Output "   Version: $version.0"
          Write-Output ""
          
          # 查找可执行文件
          $exePath = "apps/desktop/src-tauri/target/release/novel-editor.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "未找到可执行文件: $exePath"
            exit 1
          }
          
          Write-Output "✓ 找到可执行文件: $exePath"
          
          # 创建 MSIX 目录结构
          $msixDir = "msix-package"
          New-Item -ItemType Directory -Force -Path $msixDir | Out-Null
          New-Item -ItemType Directory -Force -Path "$msixDir/Assets" | Out-Null
          
          # 复制可执行文件
          Copy-Item $exePath "$msixDir/novel-editor.exe"
          Write-Output "✓ 复制可执行文件"
          
          # 复制图标
          Copy-Item "apps/desktop/src-tauri/icons/Square44x44Logo.png" "$msixDir/Assets/"
          Copy-Item "apps/desktop/src-tauri/icons/Square150x150Logo.png" "$msixDir/Assets/"
          Copy-Item "apps/desktop/src-tauri/icons/StoreLogo.png" "$msixDir/Assets/"
          Write-Output "✓ 复制图标文件"
          
          # 创建 AppxManifest.xml
          $manifest = @"
          <?xml version="1.0" encoding="utf-8"?>
          <Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
                   xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
                   xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">
            <Identity Name="$identityName"
                      Publisher="$publisher"
                      Version="$version.0" />
            <Properties>
              <DisplayName>小麦写作</DisplayName>
              <PublisherDisplayName>$publisherDisplayName</PublisherDisplayName>
              <Logo>Assets\StoreLogo.png</Logo>
            </Properties>
            <Dependencies>
              <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0" />
            </Dependencies>
            <Resources>
              <Resource Language="zh-CN" />
            </Resources>
            <Applications>
              <Application Id="NovelEditor" Executable="novel-editor.exe" EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements DisplayName="小麦写作"
                                    Description="一个现代化的小说编辑器"
                                    BackgroundColor="transparent"
                                    Square150x150Logo="Assets\Square150x150Logo.png"
                                    Square44x44Logo="Assets\Square44x44Logo.png">
                </uap:VisualElements>
              </Application>
            </Applications>
            <Capabilities>
              <rescap:Capability Name="runFullTrust" />
            </Capabilities>
          </Package>
          "@
          
          Set-Content -Path "$msixDir/AppxManifest.xml" -Value $manifest -Encoding UTF8
          Write-Output "✓ 创建 AppxManifest.xml"
          
          # 查找 MakeAppx
          Write-Output "查找 MakeAppx 工具..."
          $makeAppx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" -ErrorAction SilentlyContinue | 
                      Where-Object { $_.FullName -like "*\x64\*" } | 
                      Select-Object -First 1 -ExpandProperty FullName
          
          if (-not $makeAppx) {
            Write-Error "未找到 MakeAppx 工具"
            exit 1
          }
          
          Write-Output "✓ 找到 MakeAppx: $makeAppx"
          
          # 打包 MSIX
          $outputMsix = "novel-editor_${version}_x64.msix"
          Write-Output "打包 MSIX: $outputMsix"
          & $makeAppx pack /d $msixDir /p $outputMsix /o
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSIX 打包失败"
            exit 1
          }
          
          Write-Output "✓ MSIX 打包成功"
          
          # 显示文件信息
          if (Test-Path $outputMsix) {
            $fileInfo = Get-Item $outputMsix
            Write-Output "文件大小: $([math]::Round($fileInfo.Length / 1MB, 2)) MB"
          } else {
            Write-Error "MSIX 文件未生成"
            exit 1
          }

      # 签名 MSIX
      - name: Sign MSIX
        shell: pwsh
        env:
          MSIX_PUBLISHER: ${{ secrets.MSIX_PUBLISHER }}
        run: |
          Write-Output "签名 MSIX 包..."
          
          # 读取版本号
          $config = Get-Content 'apps/desktop/src-tauri/tauri.conf.json' | ConvertFrom-Json
          $version = $config.version
          $msixFile = "novel-editor_${version}_x64.msix"
          
          if (-not (Test-Path $msixFile)) {
            Write-Error "未找到 MSIX 文件: $msixFile"
            exit 1
          }
          
          # 获取 Publisher（用于创建证书）- 必须与 AppxManifest.xml 中的 Publisher 完全一致
          $publisher = $env:MSIX_PUBLISHER
          if ([string]::IsNullOrEmpty($publisher)) {
            # 使用 Microsoft Store Partner Center 分配的 Publisher ID
            $publisher = "CN=056C6E40-362E-4DC2-A03D-B19B795AA254"
            Write-Warning "⚠ 使用默认 Publisher: $publisher"
          }
          
          # 创建自签名证书（Subject 必须与 AppxManifest.xml 中的 Publisher 完全匹配）
          Write-Output "创建自签名证书..."
          Write-Output "  Subject: $publisher"
          $cert = New-SelfSignedCertificate -Type Custom -Subject $publisher `
            -KeyUsage DigitalSignature -FriendlyName "Novel Editor" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          
          $password = ConvertTo-SecureString -String "temp123" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "temp-cert.pfx" -Password $password | Out-Null
          Write-Output "✓ 证书创建成功"
          
          # 查找 SignTool
          Write-Output "查找 SignTool..."
          $signTool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue | 
                      Where-Object { $_.FullName -like "*\x64\*" } | 
                      Select-Object -First 1 -ExpandProperty FullName
          
          if (-not $signTool) {
            Write-Error "未找到 SignTool"
            exit 1
          }
          
          Write-Output "找到 SignTool: $signTool"
          
          # 签名 MSIX
          Write-Output "正在签名: $msixFile"
          & $signTool sign /fd SHA256 /a /f "temp-cert.pfx" /p "temp123" $msixFile
          
          if ($LASTEXITCODE -eq 0) {
            Write-Output "✓ 签名成功"
          } else {
            Write-Error "✗ 签名失败"
            exit 1
          }

      # 验证 MSIX 文件
      - name: Verify MSIX package
        shell: pwsh
        run: |
          Write-Output "验证 MSIX 包..."
          
          # 读取版本号
          $config = Get-Content 'apps/desktop/src-tauri/tauri.conf.json' | ConvertFrom-Json
          $version = $config.version
          $msixFile = "novel-editor_${version}_x64.msix"
          
          if (Test-Path $msixFile) {
            $fileInfo = Get-Item $msixFile
            Write-Output "✓ MSIX 文件存在"
            Write-Output "  文件名: $($fileInfo.Name)"
            Write-Output "  文件大小: $([math]::Round($fileInfo.Length / 1MB, 2)) MB"
            Write-Output "  完整路径: $($fileInfo.FullName)"
          } else {
            Write-Error "MSIX 文件不存在: $msixFile"
            exit 1
          }

      # 上传 MSIX 产物
      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: msix-package
          path: "*.msix"
          if-no-files-found: error

      # 发布到 GitHub Release
      - name: Upload MSIX to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.msix"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 发布完成后的通知和触发
  post-release:
    runs-on: ubuntu-latest
    needs: [publish-tauri, build-msix]
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    permissions:
      contents: write
      actions: write
    
    steps:
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/desktop-v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Desktop release completed for version: $VERSION"

      - name: Trigger dependent platform releases
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = '${{ steps.version.outputs.version }}';
            
            // 所有依赖平台列表
            const dependentPlatforms = {
              // Linux 平台（需要 deb/rpm 文件）
              linux: ['flatpak', 'aur', 'aur-bin', 'ppa', 'copr', 'obs', 'gentoo'],
              // Windows 平台（需要 MSI/NSIS 文件）
              windows: ['winget', 'scoop', 'chocolatey'],
              // macOS 平台（需要 DMG 文件）
              macos: ['homebrew']
            };
            
            console.log(`🚀 Desktop release v${version} completed successfully!`);
            console.log(`📋 Triggering all dependent platforms...`);
            
            const results = { triggered: [], failed: [] };
            
            // 触发所有依赖平台的工作流
            for (const [os, platforms] of Object.entries(dependentPlatforms)) {
              console.log(`\n🖥️ Triggering ${os} platforms...`);
              for (const platform of platforms) {
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: `${platform}-publish.yml`,
                    ref: 'main',
                    inputs: { version: version }
                  });
                  results.triggered.push({ platform, os });
                  console.log(`  ✅ ${platform}`);
                } catch (error) {
                  results.failed.push({ platform, os, error: error.message });
                  console.log(`  ⚠️ ${platform}: ${error.message}`);
                }
              }
            }
            
            // 创建成功评论
            try {
              const linuxTriggered = results.triggered.filter(p => p.os === 'linux').map(p => p.platform);
              const windowsTriggered = results.triggered.filter(p => p.os === 'windows').map(p => p.platform);
              const macosTriggered = results.triggered.filter(p => p.os === 'macos').map(p => p.platform);
              const failedList = results.failed.map(p => `- ❌ ${p.platform} (${p.os})`).join('\n');
              
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: `🎉 **Desktop Release v${version} 完成！**

            **✅ 已构建的包格式：**
            - Windows: MSI, NSIS, MSIX
            - macOS: DMG, APP (Intel + Apple Silicon)  
            - Linux: DEB, RPM, AppImage

            **🚀 自动触发的依赖平台：**
            
            🐧 **Linux:** ${linuxTriggered.length > 0 ? linuxTriggered.join(', ') : '(无)'}
            🪟 **Windows:** ${windowsTriggered.length > 0 ? windowsTriggered.join(', ') : '(无)'}
            🍎 **macOS:** ${macosTriggered.length > 0 ? macosTriggered.join(', ') : '(无)'}
            ${failedList ? '\n**⚠️ 触发失败：**\n' + failedList : ''}

            **📥 下载地址：**
            [GitHub Releases](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/desktop-v${version})

            **⏱️ 预计完成时间：** 15-20 分钟`
              });
            } catch (error) {
              console.log('无法创建评论，但发布成功:', error.message);
            }
